<body>
    <nav class="flex items-center justify-between px-6 py-4 bg-gray-700 text-white">
        <a href="index.html" class="text-2xl font-bold">My projects</a>
        <div class="flex gap-6">
            <a href="/cal.html" class="cursor-pointer hover:text-blue-400">Calculator</a>
            <a href="/wet.html" class="cursor-pointer hover:text-blue-400">Weather</a>
        </div>
    </nav>
    <div class="bg-slate-900 flex justify-center items-center min-h-screen">
        <div class="bg-slate-800 p-6 rounded-2xl shadow-2xlw-{350px}">
            <h1 class="text-center text-white text-3xl font-bold mb-5"> Calculator</h1>
            <input id="display" type="text" readonly
                class="w-full h-16 text-right text-3xl px-4 mb-5 bg-white outline-none" />
            <div class="grid grid-cols-4 gap-3">
                <button onclick="clearDisplay()"
                    class="bg-red-500 hover:bg-red-600 text-white p-4 rounded-lg ">C</button>
                <button onclick="deletelast()"
                    class="bg-yellow-500 hover:bg-yellow-600 text-white p-4 rounded-lg">Del</button>
                <button onclick="appendvalue('%')"
                    class="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-lg">%</button>
                <button onclick="appendvalue('/')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">÷</button>
                <button onclick="appendvalue('7')" class="bg-gray-200   p-4 rounded-lg">7</button>
                <button onclick="appendvalue('8')" class="bg-gray-200   p-4 rounded-lg">8</button>
                <button onclick="appendvalue('9')" class="bg-gray-200   p-4 rounded-lg">9</button>
                <button onclick="appendvalue('*')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">*</button>
                <button onclick="appendvalue('4')" class="bg-gray-200   p-4 rounded-lg">4</button>
                <button onclick="appendvalue('5')" class="bg-gray-200   p-4 rounded-lg">5</button>
                <button onclick="appendvalue('6')" class="bg-gray-200   p-4 rounded-lg">5</button>
                <button onclick="appendvalue('-')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">-</button>
                <button onclick="appendvalue('1')" class="bg-gray-200   p-4 rounded-lg">1</button>
                <button onclick="appendvalue('2')" class="bg-gray-200   p-4 rounded-lg">2</button>
                <button onclick="appendvalue('3')" class="bg-gray-200  p-4 rounded-lg">3</button>
                <button onclick="appendvalue('+')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">+</button>
                <button onclick="appendvalue('0')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">0</button>
                <button onclick="appendvalue('.')"
                    class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-lg">.</button>
                <button onclick="calculator()"
                    class="bg-green-500 hover:bg-green-500 text-white p-4 rounded-lg">=</button>
            </div>
        </div>
    </div>


    <script>
        const display = document.getElementById("display");

        function appendvalue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }
        function deletelast() {
            display.value = display.value.slice(0, -1)
        }
        function calculator() {

            try {
                display.value = eval(display.value);
            }

                }, 1000);
            }
        }
    </script>
</body>

</html>
